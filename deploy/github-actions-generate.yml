# Free scheduled generation on GitHub Actions.
# Copy to .github/workflows/generate.yml and add repo secrets:
#   NVIDIA_API_KEY, PEXELS_API_KEY, PIXABAY_API_KEY
name: generate-reading-videos

on:
  workflow_dispatch: {}        # manual "Run workflow" button
  schedule:
    - cron: "0 7 * * *"        # every day at 07:00 UTC

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Persist the background dedup DB across runs so assets aren't reused
      - name: Restore dedup DB
        uses: actions/cache@v4
        with:
          path: assets/used_assets.json
          key: used-assets-${{ github.run_id }}
          restore-keys: used-assets-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y espeak-ng   # offline TTS engine

      - name: Generate (one batch per account)
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          python -m app.main doctor
          python -m app.main accounts

      - name: Upload generated videos
        uses: actions/upload-artifact@v4
        with:
          name: reading-videos-${{ github.run_id }}
          path: outputs/jobs/**
          retention-days: 30
