# =====================================================================
#  Master configuration for reading_reels
# =====================================================================

video:
  width: 1080
  height: 1920
  fps: 30
  duration_sec: 120        # ~2 minutes, tuned per video by the timing engine
  crf: 18                  # H.264 quality (lower = better/bigger). 18-23 sane range. 18 = near-lossless
  preset: "slow"           # ffmpeg x264 preset: ultrafast->superfast->veryfast->faster->fast->medium->slow->slower->veryslow
  pix_fmt: "yuv420p"       # required for TikTok/most players
  bitrate: "8000k"         # video bitrate for HD quality (TikTok supports up to 8Mbps)
  max_bitrate: "12000k"    # peak bitrate for complex scenes
  audio_bitrate: "192k"    # AAC audio bitrate
  profile: "high"          # H.264 profile (high = better quality, TikTok compatible)
  level: "4.1"             # H.264 level for 1080p30
  tune: "stillimage"       # optimize for slideshow/image backgrounds

text:
  font_regular: "fonts/Lexend-Regular.ttf"   # auto-falls back to DejaVuSans if missing
  font_bold:    "fonts/Lexend-Bold.ttf"
  intro_font_size: 82
  body_font_size: 56
  line_spacing: 1.35       # multiplier of font size between wrapped sub-lines
  block_spacing: 48        # extra px between separate sentences/blocks
  side_margin: 72          # left/right safe margin in px
  text_color: "#FFFFFF"
  text_gradient: true      # enable gradient text effect (top->bottom fade)
  text_gradient_colors: ["#FFFFFF", "#E0E0FF"]  # top to bottom gradient
  stroke_color: "#000000"
  stroke_width: 5          # outline for contrast over any background
  shadow: true
  shadow_offset: 4
  glow: true               # subtle glow behind text for extra pop
  glow_color: "#4488FF"    # blue glow
  glow_radius: 8           # glow spread in px
  scroll_direction: "up"   # "up" (credit scroll) or "static"
  start_offset_frac: 0.10  # where the top of the strip starts (fraction of height)
  end_visible_frac: 0.82   # keep last line above this fraction at the end
  entrance_animation: "fade"  # "none", "fade", "slide" (text fades/slides in per block)
  highlight_keywords: true    # auto-highlight important words (first word of each sentence)
  highlight_color: "#FFD700"  # gold for keyword highlights

scrim:
  enabled: true            # dark contrast layer between bg and text
  opacity: 0.35            # 0..1 overall darkening (lighter = more bg visible)
  vignette: true           # stronger darkening top & bottom
  vignette_strength: 0.25  # how strong the edge darkening is
  blur_overlay: true       # slight gaussian blur on scrim for premium look
  blur_radius: 2           # blur radius in px

background:
  source_priority: ["pexels", "pixabay", "gradient"]  # tried in order
  media_type: "image"      # "image", "video", or "auto" (use IMAGE for best HD quality)
  orientation: "portrait"
  image_quality: "high"    # "high" (download largest) or "balanced"
  kenburns: true           # slow zoom/pan on still images
  kenburns_zoom: 1.08      # max zoom factor over the clip
  slideshow_enabled: false  # change images every ~5s instead of one static bg
  slideshow_image_count: 8  # number of images for slideshow
  enhance_image: true      # auto-enhance: sharpen + contrast + color grade
  sharpen_amount: 0.3      # unsharp mask amount
  contrast_boost: 1.05     # slight contrast increase
  saturation_boost: 1.10   # slight color saturation increase
  cache_dir: "assets/cache"
  dedup: true              # never reuse the same asset id twice (per account)

audio:
  intro_tts: true          # speak the two intro phrases
  narrate_reading: false   # also speak every reading line (slower to produce)
  tts_engine: "auto"       # "gtts" (online), "pyttsx3" (offline), or "auto"
  tts_lang: "en"
  tts_tld: "com"           # gTTS accent: com=US, co.uk=UK, com.au=AU, ca=CA
  music_file: ""           # optional path to a royalty-free loop (.mp3/.m4a)
  music_gain_db: -22       # background music level
  voice_gain_db: 0
  loudnorm: true           # EBU R128 normalization (-16 LUFS) via ffmpeg

ai:
  provider: "nvidia_nim"   # "nvidia_nim" or "local" (local = offline fallback bank)
  base_url: "https://integrate.api.nvidia.com/v1"
  model: "meta/llama-3.1-70b-instruct"
  temperature: 0.8
  max_tokens: 1200
  timeout_sec: 60
  retries: 2
  fallback_to_local: true  # if NIM fails/has no key, use the local content engine

intro_phrases:
  - "Let's practice English"
  - "Education is the key"

# ---------------------------------------------------------------------
#  Auto-upload to TikTok (optional). Disabled by default.
#  See docs/UPLOAD_TIKTOK.md for full setup.
# ---------------------------------------------------------------------
upload:
  enabled: false            # master switch (or pass --auto-upload on the CLI)
  method: "web"             # "web" (browser automation) or "api" (official API)
  web:
    upload_url: "https://www.tiktok.com/tiktokstudio/upload"
    chrome_profile_dir: "assets/chrome_profile"   # log in once; reused forever
    headless: false         # keep false: TikTok blocks most headless uploads
    keep_browser_open: false
    post_button_timeout: 180
    post_finalize_wait: 12
    selectors:              # update these if TikTok changes its page
      file_input: "input[type='file']"
      caption: "div[contenteditable='true']"
      post_button_xpath: "//button[.//div[contains(., 'Post')] or contains(., 'Post')]"
  api:
    access_token_env: "TIKTOK_ACCESS_TOKEN"   # env var holding the token
    privacy_level: "SELF_ONLY"                # SELF_ONLY until your app is audited

paths:
  outputs: "outputs"
  jobs: "outputs/jobs"
  used_assets_db: "assets/used_assets.json"
